# Per-service Railway config for the citywater.ca brochure.

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
# Static brochure — root is always 200; healthcheck exists so a hung
# nginx is detected and restarted.
healthcheckPath = "/"
healthcheckTimeout = 10
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5
