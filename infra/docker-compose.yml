services:
  postgres:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_USER: citywater
      POSTGRES_PASSWORD: citywater
      POSTGRES_DB: citywater
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U citywater -d citywater"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: citywater
      MINIO_ROOT_PASSWORD: citywater_minio_dev
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  pg_tileserv:
    image: pramsey/pg_tileserv:latest
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://citywater:citywater@postgres:5432/citywater
    ports:
      - "7800:7800"
    volumes:
      - ./pg_tileserv.toml:/config/pg_tileserv.toml:ro
    command: ["/app/pg_tileserv", "--config", "/config/pg_tileserv.toml"]
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://localhost:7800/index.json || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
  minio_data:
